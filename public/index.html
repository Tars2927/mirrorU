<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#f5f5f7" />
  <title>Mirror of Truth</title>
  <meta name="description" content="A refined AI oracle for stark philosophical reflections." />
  <meta property="og:title" content="Mirror of Truth" />
  <meta property="og:description" content="A refined AI oracle for stark philosophical reflections." />
  <meta property="og:image" content="/assets/mirror-hero.png" />
  <link rel="preload" as="image" href="/assets/mirror-hero.png" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <svg class="icon-sprite" aria-hidden="true">
    <symbol id="icon-copy" viewBox="0 0 24 24">
      <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
      <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
    </symbol>
    <symbol id="icon-share" viewBox="0 0 24 24">
      <circle cx="18" cy="5" r="3"></circle>
      <circle cx="6" cy="12" r="3"></circle>
      <circle cx="18" cy="19" r="3"></circle>
      <path d="m8.6 13.5 6.8 4"></path>
      <path d="m15.4 6.5-6.8 4"></path>
    </symbol>
    <symbol id="icon-sparkles" viewBox="0 0 24 24">
      <path d="M9.9 4.2 11 7.6l3.4 1.1L11 9.8l-1.1 3.4-1.1-3.4-3.4-1.1 3.4-1.1 1.1-3.4Z"></path>
      <path d="M17.8 12.4 19 16l3.6 1.2L19 18.4 17.8 22l-1.2-3.6-3.6-1.2 3.6-1.2 1.2-3.6Z"></path>
      <path d="m5 16 .6 1.8L7.4 18l-1.8.6L5 20.4l-.6-1.8L2.6 18l1.8-.6L5 16Z"></path>
    </symbol>
    <symbol id="icon-shuffle" viewBox="0 0 24 24">
      <path d="M16 3h5v5"></path>
      <path d="M4 20 21 3"></path>
      <path d="M21 16v5h-5"></path>
      <path d="m15 15 6 6"></path>
      <path d="m4 4 5 5"></path>
    </symbol>
    <symbol id="icon-trash" viewBox="0 0 24 24">
      <path d="M3 6h18"></path>
      <path d="M8 6V4h8v2"></path>
      <path d="m19 6-1 14H6L5 6"></path>
      <path d="M10 11v5"></path>
      <path d="M14 11v5"></path>
    </symbol>
    <symbol id="icon-x" viewBox="0 0 24 24">
      <path d="M18 6 6 18"></path>
      <path d="m6 6 12 12"></path>
    </symbol>
    <symbol id="icon-moon" viewBox="0 0 24 24">
      <path d="M12 3a6.8 6.8 0 1 0 9 9 9 9 0 1 1-9-9Z"></path>
    </symbol>
  </svg>

  <div class="app-shell">
    <header class="topbar">
      <a class="brand" href="/" aria-label="Mirror of Truth home">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>Mirror of Truth</span>
      </a>

      <div class="topbar-actions">
        <span id="api-status" class="status-pill" data-state="checking">Checking</span>
        <button id="theme-toggle" class="icon-button" type="button" aria-label="Toggle appearance" data-tooltip="Appearance">
          <svg aria-hidden="true"><use href="#icon-moon"></use></svg>
        </button>
      </div>
    </header>

    <main>
      <section class="workspace" aria-labelledby="app-title">
        <div class="intro-panel">
          <figure class="product-visual mirror-scene" id="mirror-scene" role="button" aria-label="Tap to flip mirror" tabindex="0">
            <div class="mirror-flipper" id="mirror-flipper">
              <div class="mirror-front">
                <img src="/assets/mirror-hero.png" alt="A freestanding reflective glass mirror in a bright studio." width="1536" height="864" />
                <div class="mirror-overlay">
                  <p class="eyebrow">AI oracle</p>
                  <h1 id="app-title">A mirror that does not flatter.</h1>
                  <p class="lede">Stark philosophical reflections, shaped by tradition, language, tone, and subject.</p>
                </div>
                <figcaption>
                  <span id="visual-source">Stoic Philosophy</span>
                  <span id="visual-tone">Quietly Devastating</span>
                </figcaption>
              </div>
              <div class="mirror-back" aria-live="polite" aria-atomic="true">
                <div class="truth-toolbar">
                  <div>
                    <p class="section-kicker">Current</p>
                    <h2>Truth</h2>
                  </div>
                  <div class="tool-row">
                    <button id="copy-quote" class="icon-button" type="button" aria-label="Copy quote" data-tooltip="Copy" disabled>
                      <svg aria-hidden="true"><use href="#icon-copy"></use></svg>
                    </button>
                    <button id="share-quote" class="icon-button" type="button" aria-label="Share quote" data-tooltip="Share" disabled>
                      <svg aria-hidden="true"><use href="#icon-share"></use></svg>
                    </button>
                    <button id="clear-quote" class="icon-button" type="button" aria-label="Clear quote" data-tooltip="Clear" disabled>
                      <svg aria-hidden="true"><use href="#icon-x"></use></svg>
                    </button>
                  </div>
                </div>
                <div class="mirror-back-content">
                  <blockquote id="quote">
                    You are not lost. You are loyal to a version of yourself that already failed.
                  </blockquote>
                  <p id="attr">Stoic Philosophy - English</p>
                  <p id="quote-stamp" class="quote-stamp">Ready</p>
                </div>
              </div>
            </div>
          </figure>
        </div>

        <form id="oracle-form" class="composer-panel" novalidate>
          <div class="panel-heading">
            <div>
              <p class="section-kicker">Compose</p>
              <h2>Reflection</h2>
            </div>
            <button id="randomize" class="icon-button" type="button" aria-label="Shuffle settings" data-tooltip="Shuffle">
              <svg aria-hidden="true"><use href="#icon-shuffle"></use></svg>
            </button>
          </div>

          <fieldset class="control-group">
            <legend>Source</legend>
            <div class="choice-grid choice-grid-source">
              <label class="choice">
                <input type="radio" name="source" value="Stoic Philosophy" checked />
                <span>Stoic Philosophy</span>
              </label>
              <label class="choice">
                <input type="radio" name="source" value="Bhagavad Gita" />
                <span>Bhagavad Gita</span>
              </label>
              <label class="choice">
                <input type="radio" name="source" value="Upanishads" />
                <span>Upanishads</span>
              </label>
              <label class="choice">
                <input type="radio" name="source" value="Nietzsche" />
                <span>Nietzsche</span>
              </label>
              <label class="choice">
                <input type="radio" name="source" value="Buddhism / Dhammapada" />
                <span>Dhammapada</span>
              </label>
              <label class="choice">
                <input type="radio" name="source" value="Taoism" />
                <span>Taoism</span>
              </label>
            </div>
          </fieldset>

          <fieldset class="control-group">
            <legend>Tone</legend>
            <div class="choice-grid">
              <label class="choice">
                <input type="radio" name="tone" value="Quietly Devastating" checked />
                <span>Quietly Devastating</span>
              </label>
              <label class="choice">
                <input type="radio" name="tone" value="Brutally Honest" />
                <span>Brutally Honest</span>
              </label>
              <label class="choice">
                <input type="radio" name="tone" value="Cold &amp; Philosophical" />
                <span>Cold</span>
              </label>
              <label class="choice">
                <input type="radio" name="tone" value="Melancholic" />
                <span>Melancholic</span>
              </label>
            </div>
          </fieldset>

          <div class="field-grid">
            <label class="field">
              <span>Language</span>
              <select id="language" name="language">
                <option>English</option>
                <option>Hindi</option>
                <option>Sanskrit (with English meaning)</option>
                <option>Urdu</option>
                <option>Bengali</option>
                <option>Tamil</option>
                <option>Spanish</option>
                <option>French</option>
                <option>German</option>
                <option>Arabic</option>
                <option>Japanese</option>
                <option>Russian</option>
              </select>
            </label>

            <label class="field">
              <span>Subject</span>
              <input id="topic" name="topic" type="text" value="Self-Deception" maxlength="80" autocomplete="off" />
            </label>
          </div>

          <div class="topic-row" aria-label="Subject presets">
            <button type="button" data-topic="Ego &amp; Illusion">Ego</button>
            <button type="button" data-topic="Time &amp; Death">Time</button>
            <button type="button" data-topic="Comfort &amp; Cowardice">Comfort</button>
            <button type="button" data-topic="Attachment">Attachment</button>
            <button type="button" data-topic="Ambition">Ambition</button>
          </div>

          <div id="error" class="notice" role="alert" aria-live="polite" hidden></div>

          <button id="reveal" class="primary-button" type="submit">
            <span class="spinner" aria-hidden="true"></span>
            <svg aria-hidden="true"><use href="#icon-sparkles"></use></svg>
            <span class="button-label">Reveal</span>
          </button>
        </form>


        <section class="history-panel" aria-labelledby="history-title">
          <div class="panel-heading">
            <div>
              <p class="section-kicker">Library</p>
              <h2 id="history-title">Recent Reflections</h2>
            </div>
            <button id="clear-history" class="icon-button" type="button" aria-label="Clear history" data-tooltip="Clear all">
              <svg aria-hidden="true"><use href="#icon-trash"></use></svg>
            </button>
          </div>
          <div id="history-list" class="history-list"></div>
        </section>
      </section>
    </main>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

  <script src="/app.js" defer></script>
</body>
</html>
